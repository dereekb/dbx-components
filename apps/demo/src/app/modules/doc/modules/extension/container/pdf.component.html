<dbx-content-container>
  <doc-feature-layout header="PDF Merge Editor" hint="Used for combining multiple PDFs and/or images into a single merged PDF.">
    <!-- Examples -->
    <doc-feature-example header="dbx-pdf-merge-editor" hint="Add files via drag-drop or the file picker, reorder by dragging the handle, then click Merge to produce a single PDF blob. The blob is emitted via the (merged) output.">
      <p>Drop PDFs (application/pdf) and/or images (PNG/JPEG) into the upload area. Drag the handle on each row to reorder. Pages are appended in list order; image entries become a single page sized to the image.</p>
      <dbx-content-border>
        <dbx-pdf-merge-editor (merged)="onMerged($event)"></dbx-pdf-merge-editor>
      </dbx-content-border>
      @if (lastBlobSizeSignal(); as size) {
        <p class="dbx-hint">Last merged blob size: {{ size }} bytes</p>
      }
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
