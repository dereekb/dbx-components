    <doc-feature-example header="dbx-quiz" hint="Complete quiz example with multiple choice and Likert scale questions.">
      <dbx-quiz [quiz]="quiz"></dbx-quiz>

    <doc-feature-example header="QuizStore State" hint="Live QuizStore state displayed via JsonPipe.">

  </doc-feature-layout>
</dbx-content-container>
