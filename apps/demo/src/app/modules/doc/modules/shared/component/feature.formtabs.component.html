<div class="doc-feature-form-tabs" [class.mobile]="isMobile()">
  <div class="doc-feature-form-tabs-toolbar dbx-flex">
    <dbx-spacer />
    <mat-slide-toggle [checked]="disabled()" (change)="setDisabled($event.checked)">Disable Fields</mat-slide-toggle>
  </div>
  <div class="doc-feature-form-tabs-column formly-column">
    <div class="doc-feature-form-tabs-header">
      <span>ngx-formly</span>
      @if (formlyFn()) {
        <code class="doc-feature-form-tabs-fn">{{ formlyFn() }}</code>
      }
    </div>
    <div class="doc-feature-form-tabs-content">
      <ng-content select="[formly]"></ng-content>
    </div>
  </div>
  <div class="doc-feature-form-tabs-column forge-column">
    <div class="doc-feature-form-tabs-header">
      <span>ng-forge</span>
      @if (forgeFn()) {
        <code class="doc-feature-form-tabs-fn">{{ forgeFn() }}</code>
      }
    </div>
    <div class="doc-feature-form-tabs-content">
      <ng-content select="[forge]"></ng-content>
    </div>
  </div>
</div>
