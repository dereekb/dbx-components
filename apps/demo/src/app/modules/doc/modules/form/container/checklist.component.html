<dbx-content-container>
  <doc-feature-layout header="Checklist Field" hint="A complex form field that is used to map values from the input data to boolean values to form a checklist. The value's display can be configured to display anything.">
    <!-- Examples -->
    <doc-feature-example header="Example" hint="The forge version uses dbxForgeChecklistField() with static options.">
      <doc-feature-form-tabs #formTabs forgeFn="dbxForgeChecklistField()">
        <doc-forge-example-form forge [config]="forgeChecklistConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
