<dbx-content-container>
  <doc-feature-layout header="Expression Examples">
    <doc-feature-derived type="uses" from="@ng-forge/dynamic-forms" url="https://www.ng-forge.com/dynamic-forms">
      <p>ng-forge supports conditional logic on most fields, letting you show/hide or otherwise react to another field's value.</p>
    </doc-feature-derived>
    <!-- Examples -->
    <doc-feature-example header="Hide Example" hint="You can conditionally show/hide fields based on another field's value using ng-forge's logic configs. Hidden fields will be removed from output, and not save values when show/hide is changed.">
      <doc-feature-form-tabs #formTabs>
        <doc-forge-example-form forge [config]="forgeBasicFieldsConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
