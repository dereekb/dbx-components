<dbx-content-container>
  <doc-feature-layout header="Value Fields" hint="">
    <!-- Examples -->
    <doc-feature-example header="phoneField()" hint="Used to configure a phone input field.">
      <h4>Phone Number Only</h4>
      <doc-feature-form-tabs #formTabs forgeFn="dbxForgePhoneField()">
        <doc-forge-example-form forge [config]="forgePhoneFieldsConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="textField()" hint="Used to configure a text field.">
      <p>There are also several helper builders available.</p>
      <doc-feature-form-tabs forgeFn="dbxForgeTextField()">
        <doc-forge-example-form forge [config]="forgeTextFieldsConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="numberField()" hint="Used to configure a number field.">
      <doc-feature-form-tabs forgeFn="dbxForgeNumberField()">
        <doc-forge-example-form forge [config]="forgeNumberFieldsConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="numberSliderField()" hint="Used to configure a number field using a slider.">
      <doc-feature-form-tabs forgeFn="dbxForgeNumberSliderField()">
        <doc-forge-example-form forge [config]="forgeNumberSliderFieldsConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="textAreaField()" hint="Used to configure a text area.">
      <doc-feature-form-tabs forgeFn="dbxForgeTextAreaField()">
        <doc-forge-example-form forge [config]="forgeTextAreaFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="toggleField()" hint="">
      <doc-feature-form-tabs forgeFn="dbxForgeToggleField()">
        <doc-forge-example-form forge [config]="forgeToggleFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="toggleField() - styledBox: false" hint="">
      <doc-forge-example-form [config]="forgeToggleNoBoxFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
    </doc-feature-example>
    <doc-feature-example header="checkboxField()" hint="">
      <doc-feature-form-tabs forgeFn="dbxForgeCheckboxField()">
        <doc-forge-example-form forge [config]="forgeCheckboxFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="addressField()" hint="Used to configure an address.">
      <h4>Default Address</h4>
      <doc-feature-form-tabs forgeFn="dbxForgeAddressGroup()">
        <doc-forge-example-form forge [config]="forgeAddressFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
      <h4>Slim Address</h4>
      <doc-feature-form-tabs forgeFn="dbxForgeAddressGroup()">
        <doc-forge-example-form forge [config]="forgeSlimAddressFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
      <h4>Address List</h4>
      <doc-feature-form-tabs forgeFn="dbxForgeAddressListField()">
        <doc-forge-example-form forge [config]="forgeAddressListFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
