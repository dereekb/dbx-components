<dbx-content-container>
  <doc-feature-layout header="Text Editor" hint="">
    <dbx-bar>
      <mat-slide-toggle [checked]="disabled()" (change)="disabled.set($event.checked)">Disable All Fields</mat-slide-toggle>
    </dbx-bar>
    <doc-feature-derived type="uses" from="@bobbyquantum/ngx-editor" url="https://github.com/bobbyquantum/ngx-editor"></doc-feature-derived>
    <!-- Examples -->
    <doc-feature-example header="textEditorField()" hint="The text editor is a fully usable text editor that takes in and exports an HTML string.">
      <doc-feature-form-tabs formlyFn="formlyTextEditorField()" forgeFn="forgeTextEditorField()">
        <doc-form-example-form formly [dbxFormlyFields]="textEditorField" [disabled]="disabled()"></doc-form-example-form>
        <doc-forge-example-form forge [config]="forgeTextEditorFieldConfig" [disabled]="disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
