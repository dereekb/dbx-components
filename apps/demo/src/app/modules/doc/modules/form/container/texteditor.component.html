<dbx-content-container>
  <doc-feature-layout header="Text Editor" hint="">
    <doc-feature-derived type="uses" from="@bobbyquantum/ngx-editor" url="https://github.com/bobbyquantum/ngx-editor"></doc-feature-derived>
    <!-- Examples -->
    <doc-feature-example header="textEditorField()" hint="The text editor is a fully usable text editor that takes in and exports an HTML string.">
      <doc-feature-form-tabs #formTabs formlyFn="formlyTextEditorField()" forgeFn="dbxForgeTextEditorField()">
        <doc-form-example-form formly [dbxFormlyFields]="textEditorField" [disabled]="formTabs.disabled()"></doc-form-example-form>
        <doc-forge-example-form forge [config]="forgeTextEditorFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
