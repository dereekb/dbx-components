<dbx-content-container>
  <doc-feature-layout header="Component Field" hint="The component field is used to inject an arbitrary component into a form.">
    <!-- Examples -->
    <doc-feature-example header="Example" hint="">
      <dbx-bar>
        <button mat-raised-button (click)="showA()">Show A</button>
        <dbx-button-spacer></dbx-button-spacer>
        <button mat-raised-button (click)="showB()">Show B</button>
        <dbx-spacer></dbx-spacer>
      </dbx-bar>
      <doc-feature-form-tabs #formTabs formlyFn="formlyComponentField()" forgeFn="dbxForgeComponentField()">
        <doc-form-example-component-form formly [config]="config" [disabled]="formTabs.disabled()"></doc-form-example-component-form>
        <div forge>
          <doc-forge-example-component-form [config]="config" [disabled]="formTabs.disabled()"></doc-forge-example-component-form>
          <h3>Allow Disabled Effects: false</h3>
          <div>Disabled effects are enabled by default.</div>
          <doc-forge-example-component-form [config]="{ ...config, allowDisabledEffects: false }" [disabled]="formTabs.disabled()"></doc-forge-example-component-form>
        </div>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
