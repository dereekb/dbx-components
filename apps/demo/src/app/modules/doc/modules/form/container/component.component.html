<dbx-content-container>
  <doc-feature-layout header="Component Field" hint="The component field is used to inject an arbitrary component into a form.">
    <dbx-bar>
      <mat-slide-toggle [checked]="disabled()" (change)="disabled.set($event.checked)">Disable All Fields</mat-slide-toggle>
    </dbx-bar>
    <!-- Examples -->
    <doc-feature-example header="Example" hint="">
      <dbx-bar>
        <button mat-raised-button (click)="showA()">Show A</button>
        <dbx-button-spacer></dbx-button-spacer>
        <button mat-raised-button (click)="showB()">Show B</button>
        <dbx-spacer></dbx-spacer>
      </dbx-bar>
      <doc-feature-form-tabs>
        <doc-form-example-component-form formly [config]="config" [disabled]="disabled()"></doc-form-example-component-form>
        <doc-forge-example-component-form forge [config]="config" [disabled]="disabled()"></doc-forge-example-component-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
