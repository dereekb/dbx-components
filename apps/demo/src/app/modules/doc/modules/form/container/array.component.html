<dbx-content-container>
  <doc-feature-layout header="Array Fields" hint="">
    <!-- Examples -->
    <doc-feature-example header="repeatArrayField()" hint="Used to configure an array of a customizable field type. Configured with custom add/remove text and a max of 2 items.">
      <doc-feature-form-tabs>
        <doc-form-example-form formly [dbxFormlyFields]="basicRepeatArrayField"></doc-form-example-form>
        <doc-forge-example-form forge [config]="forgeDragArrayConfig"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="repeatArrayField() - Advanced" hint="Shows the duplicate button, per-item labels, disabled rearrange, and conditional remove.">
      <doc-feature-form-tabs>
        <doc-form-example-form formly [dbxFormlyFields]="advancedRepeatArrayField" [dbxFormSource]="advancedRepeatArrayValue"></doc-form-example-form>
        <doc-forge-example-form forge [config]="forgeDragArrayAdvancedConfig"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
