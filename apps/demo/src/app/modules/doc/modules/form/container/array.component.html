<dbx-content-container>
  <doc-feature-layout header="Array Fields" hint="">
    <!-- Examples -->
    <doc-feature-example header="repeatArrayField()" hint="Used to configure an array of a customizable field type. Configured with custom add/remove text and a max of 2 items.">
      <doc-feature-form-tabs #formTabs forgeFn="forgeArrayField()">
        <doc-forge-example-form forge [config]="forgeDragArrayConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
    <doc-feature-example header="repeatArrayField() - Advanced" hint="Shows the duplicate button, per-item labels, disabled rearrange, and conditional remove.">
      <doc-feature-form-tabs forgeFn="forgeArrayField()">
        <doc-forge-example-form forge [config]="forgeDragArrayAdvancedConfig" [dbxFormSource]="advancedRepeatArrayValue" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
