<dbx-content-container>
  <doc-feature-layout header="" hint="">
    <!-- Examples -->
    <doc-feature-example header="expandWrapper()" hint="Wraps a field with content that can be expanded to reveal optional fields.">
      <doc-feature-form-tabs #formTabs forgeFn="dbxForgeExpandWrapper()">
        <doc-forge-example-form forge [config]="forgeExpandFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="toggleWrapper()" hint="Wraps a field and adds a slider that can be toggled to hide or reveal fields.">
      <doc-feature-form-tabs forgeFn="dbxForgeToggleWrapper()">
        <doc-forge-example-form forge [config]="forgeToggleFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="sectionWrapper()" hint="Wraps a field with a dbx-section.">
      <doc-feature-form-tabs forgeFn="dbxForgeSectionWrapper()">
        <doc-forge-example-form forge [config]="forgeSectionFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="subsectionWrapper()" hint="Wraps a field with a dbx-subsection.">
      <doc-feature-form-tabs forgeFn="dbxForgeSubsectionWrapper()">
        <doc-forge-example-form forge [config]="forgeSubsectionFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="infoWrapper()" hint="Wraps a field with content that attaches an info button.">
      <doc-feature-form-tabs forgeFn="dbxForgeInfoWrapper()">
        <doc-forge-example-form forge [config]="forgeInfoFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
      <h4>Info Wrapper with Multiple Fields</h4>
      <doc-forge-example-form [config]="forgeInfoGroupFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
    </doc-feature-example>

    <doc-feature-example header="styleWrapper()" hint="Wraps a field with arbitrary styles and classes.">
      <doc-feature-form-tabs forgeFn="forgeStyleWrapper()">
        <doc-forge-example-form forge [config]="forgeStyleFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="workingWrapper()" hint="Wraps fields with a loading indicator that appears during async validation. Type a value and wait to see the loading bar. Type 'taken' to trigger a validation error.">
      <doc-feature-form-tabs forgeFn="dbxForgeTextIsAvailableField()">
        <doc-forge-example-form forge [config]="forgeWorkingFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="forgeFormFieldWrapper()" hint="Wraps child fields inside a Material-style outlined container with a notched outline, floating label, and hint/error subscript. Useful for fields like sliders that cannot use mat-form-field directly.">
      <doc-feature-form-tabs forgeFn="forgeFormFieldWrapper()">
        <doc-forge-example-form forge [config]="forgeFormFieldWrapperSliderConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>

    <doc-feature-example header="flexLayoutWrapper()" hint="Wraps one or more fields to be displayed with flex layout. The flex layout can be configured per item. A screen width breakpoints can also be set to control if/when to collapse each item to full width.">
      <doc-feature-form-tabs forgeFn="dbxForgeFlexLayout()">
        <doc-forge-example-form forge [config]="forgeFlexFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
      <h4>3 Per Row - Retain size down to small width</h4>
      <doc-feature-form-tabs forgeFn="dbxForgeFlexLayout()">
        <doc-forge-example-form forge [config]="forgeFlexThreeFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
      <h4>3 Per Row and Break To Column - At small width the break will change the flex to a column</h4>
      <doc-feature-form-tabs forgeFn="dbxForgeFlexLayout()">
        <doc-forge-example-form forge [config]="forgeFlexThreeFieldBreakToColumnConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
      <h4>5 Per Row - Retain size down to large width - with relative enabled to expand content</h4>
      <doc-feature-form-tabs forgeFn="dbxForgeFlexLayout()">
        <doc-forge-example-form forge [config]="forgeFlexFiveFieldConfig" [disabled]="formTabs.disabled()"></doc-forge-example-form>
      </doc-feature-form-tabs>
    </doc-feature-example>
  </doc-feature-layout>
</dbx-content-container>
