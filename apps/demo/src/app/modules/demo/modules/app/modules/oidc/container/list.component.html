<dbx-two-column dbxTwoColumnContext [dbxTwoColumnSref]="oidcClientListRef" dbxTwoColumnSrefShowRight>
  <dbx-two-block left dbxOidcEntryCollection [constraints]="clientConstraintsSignal()">
    <dbx-two-column-head top></dbx-two-column-head>
    <dbx-firebase-oidc-client-list dbxFirebaseCollectionList dbxListItemModifier [dbxListItemAnchorModifier]="makeClientAnchor">
      <div class="text-center dbx-pb3" end>
        <dbx-anchor [anchor]="oidcClientCreateRef">
          <dbx-button text="Create Client" icon="add" [raised]="true"></dbx-button>
        </dbx-anchor>
      </div>
    </dbx-firebase-oidc-client-list>
  </dbx-two-block>
  <ui-view dbxOidcEntryDocument storeName="oidcEntry" dbxRouteModelId right></ui-view>
</dbx-two-column>
