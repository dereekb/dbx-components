<dbx-section header="OAuth Clients">
  <dbx-content-box>
    <dbx-oauth-client-list [clients]="clients()" (selectClient)="onSelectClient($event)"></dbx-oauth-client-list>
  </dbx-content-box>
</dbx-section>
@if (selectedClient(); as client) {
  <dbx-section header="Client Details">
    <dbx-content-box>
      <dbx-oauth-client-detail [client]="client" (revoke)="onRevokeClient($event)"></dbx-oauth-client-detail>
    </dbx-content-box>
  </dbx-section>
}
