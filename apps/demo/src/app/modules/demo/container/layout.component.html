<dbx-sidenav color="primary" [anchors]="navAnchorsSignal()" dbxSetStyle="demo-app" dbxFirebaseDocumentStoreContextStore [dbxWebPageTitleInfo]="pageTitleInfo">
  <ng-container top *dbxIfSidenavDisplayMode="['mobile', 'full']">
    <dbx-content-border>
      <p class="mat-h2">dbx-components</p>
      <p class="dbx-hint">demo app</p>
    </dbx-content-border>
  </ng-container>
  <dbx-sidenav-page>
    <span navRight>
      <dbx-firebase-model-entities-popover-button [config]="entitiesButtonConfig" dbxFirebaseDocumentStoreContextModelEntitiesSource></dbx-firebase-model-entities-popover-button>
    </span>
    <ui-view></ui-view>
  </dbx-sidenav-page>
  <div bottom>
    <dbx-anchor-list [anchors]="bottomNavAnchorsSignal()"></dbx-anchor-list>
  </div>
</dbx-sidenav>
