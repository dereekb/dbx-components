<div class="dbx-quiz-answer-number" (dbxWindowKeyDownListener)="handleKeyDown($event)" [dbxWindowKeyDownFilter]="relevantKeysSignal()">
  <div class="dbx-quiz-answer-number-buttons dbx-button-wrap-group">
    @for (choice of choicesSignal(); track choice.number) {
      <dbx-button [color]="choice.selected ? 'accent' : 'primary'" [raised]="true" (buttonClick)="clickedAnswer(choice.number)">{{ choice.number }}</dbx-button>
    }
  </div>
</div>
