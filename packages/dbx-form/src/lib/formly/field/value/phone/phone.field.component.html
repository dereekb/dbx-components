<div class="dbx-form-phone-field" [formGroup]="inputFormGroup">
  <ngx-mat-input-tel name="phone" class="dbx-form-phone-field-phone-content" [required]="required" [enableSearch]="enableSearch" [preferredCountries]="preferredCountries" [enablePlaceholder]="false" [formControl]="phoneCtrl"></ngx-mat-input-tel>
  @if (allowExtension) {
    <div class="dbx-form-phone-field-extension-content">
      <span class="dbx-hint dbx-button-spacer">Ext.</span>
      <input name="phone-extension" class="dbx-form-phone-field-extension-input" placeholder="123" minlength="0" maxlength="6" #extensionInput [formControl]="extensionCtrl" />
    </div>
  }
</div>
