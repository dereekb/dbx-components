<div class="dbx-forge-daterange-field">
  <mat-form-field [appearance]="effectiveAppearanceSignal()" subscriptSizing="dynamic" class="dbx-forge-daterange-start">
    <mat-label>{{ startLabelSignal() }}</mat-label>
    <input matInput [matDatepicker]="startPicker" [formControl]="startDateCtrl" [min]="minDateSignal()" [max]="maxDateSignal()" [attr.aria-invalid]="ariaInvalidSignal()" [attr.aria-required]="ariaRequiredSignal()" [attr.aria-describedby]="ariaDescribedBySignal()" />
    <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
    <mat-datepicker #startPicker></mat-datepicker>
  </mat-form-field>
  @if (showTimeSignal()) {
    <mat-form-field [appearance]="effectiveAppearanceSignal()" subscriptSizing="dynamic" class="dbx-forge-daterange-start-time">
      <mat-label>Start Time</mat-label>
      <input matInput type="time" [formControl]="startTimeCtrl" />
    </mat-form-field>
  }
  <mat-form-field [appearance]="effectiveAppearanceSignal()" subscriptSizing="dynamic" class="dbx-forge-daterange-end">
    <mat-label>{{ endLabelSignal() }}</mat-label>
    <input matInput [matDatepicker]="endPicker" [formControl]="endDateCtrl" [min]="minDateSignal()" [max]="maxDateSignal()" />
    <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
    <mat-datepicker #endPicker></mat-datepicker>
  </mat-form-field>
  @if (showTimeSignal()) {
    <mat-form-field [appearance]="effectiveAppearanceSignal()" subscriptSizing="dynamic" class="dbx-forge-daterange-end-time">
      <mat-label>End Time</mat-label>
      <input matInput type="time" [formControl]="endTimeCtrl" />
    </mat-form-field>
  }
  @if (errorsToDisplaySignal()[0]; as error) {
    <mat-error [id]="errorIdSignal()">{{ error.message }}</mat-error>
  } @else if (props()?.hint; as hint) {
    <mat-hint [id]="hintIdSignal()">{{ hint | dynamicText | async }}</mat-hint>
  }
</div>
