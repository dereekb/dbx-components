<mat-form-field [appearance]="effectiveAppearanceSignal()" subscriptSizing="dynamic" class="dbx-forge-timeduration-field">
  @if (label()) {
    <mat-label>{{ label() | dynamicText | async }}</mat-label>
  }
  <input matInput type="text" [formControl]="textCtrl" (blur)="onTextBlur()" (keydown.enter)="onTextEnter($event)" placeholder="e.g. 2h30m" [attr.aria-invalid]="ariaInvalidSignal()" [attr.aria-required]="ariaRequiredSignal()" [attr.aria-describedby]="ariaDescribedBySignal()" />
  <button mat-icon-button matSuffix type="button" #pickerButton (click)="openPicker()" [disabled]="isDisabled()" aria-label="Open duration picker">
    <mat-icon>schedule</mat-icon>
  </button>
  @if (errorsToDisplaySignal()[0]; as error) {
    <mat-error [id]="errorIdSignal()">{{ error.message }}</mat-error>
  } @else if (props()?.hint; as hint) {
    <mat-hint [id]="hintIdSignal()">{{ hint | dynamicText | async }}</mat-hint>
  }
</mat-form-field>
