<div class="dbx-form-repeat-array">
  <div cdkDropList [cdkDropListDisabled]="disableRearrangeSignal() || isDisabled()" (cdkDropListDropped)="drop($event)">
    @for (item of itemsSignal(); track item.trackId; let i = $index) {
      <div class="dbx-form-repeat-array-field" cdkDrag cdkDragLockAxis="y">
        <ng-template cdkDragPlaceholder>
          <div class="dbx-form-repeat-array-drag-placeholder"></div>
        </ng-template>
        <div class="dbx-form-repeat-array-bar dbx-flex-bar">
          @if (!disableRearrangeSignal()) {
            <button mat-icon-button type="button" cdkDragHandle class="dbx-form-repeat-array-drag-button" [disabled]="isDisabled()" aria-label="Drag to reorder">
              <mat-icon>drag_handle</mat-icon>
            </button>
            <dbx-button-spacer></dbx-button-spacer>
          }
          <span class="dbx-form-repeat-array-label">{{ labelForItem(i, item.value) }}</span>
          <span class="spacer"></span>
          @if (allowDuplicateSignal()) {
            <dbx-button [text]="duplicateTextSignal()" [buttonStyle]="duplicateButtonStyleSignal()" [disabled]="isDisabled()" (buttonClick)="duplicateItem(i)"></dbx-button>
            <dbx-button-spacer></dbx-button-spacer>
          }
          @if (allowRemoveSignal()) {
            <dbx-button [text]="removeTextSignal()" [buttonStyle]="removeButtonStyleSignal()" [disabled]="isDisabled()" (buttonClick)="removeItem(i)"></dbx-button>
          }
        </div>
        <div class="dbx-form-repeat-array-field-content">
          <form [dynamic-form]="templateConfigSignal()" [value]="asPartial(item.value)" [formOptions]="formOptionsSignal()" (valueChange)="onItemValueChange(i, $event)"></form>
        </div>
      </div>
    }
  </div>
  @if (showAddButtonSignal()) {
    <div class="dbx-form-repeat-array-footer">
      <dbx-button [text]="addTextSignal()" [buttonStyle]="addButtonStyleSignal()" [disabled]="isDisabled()" (buttonClick)="addItem()"></dbx-button>
    </div>
  }
</div>
