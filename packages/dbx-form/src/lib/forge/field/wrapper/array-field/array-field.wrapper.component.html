<div class="dbx-form-repeat-array">
  @if (labelSignal(); as labelText) {
    <div class="dbx-form-repeat-array-header">
      <h4 class="dbx-form-repeat-array-title">{{ labelText | dynamicText | async }}</h4>
    </div>
  }
  @if (hintSignal(); as hintText) {
    <p class="dbx-form-repeat-array-hint">{{ hintText | dynamicText | async }}</p>
  }
  <div class="dbx-form-repeat-array-content">
    <ng-container #fieldComponent></ng-container>
  </div>
</div>
