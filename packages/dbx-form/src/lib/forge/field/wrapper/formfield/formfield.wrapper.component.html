<div class="dbx-forge-form-field-wrapper" [class.dbx-forge-form-field-wrapper-error]="hasError()" [class.dbx-forge-form-field-wrapper-disabled]="isDisabledSignal()" role="group" [attr.aria-labelledby]="labelSignal() ? labelIdSignal() : null">
  <div class="dbx-forge-form-field-outline">
    <div class="dbx-forge-form-field-outline-leading"></div>
    <div class="dbx-forge-form-field-outline-notch" [class.dbx-forge-form-field-outline-notch-empty]="!labelSignal()">
      @if (labelSignal(); as labelText) {
        <span class="dbx-forge-form-field-outline-label" [id]="labelIdSignal()">
          {{ labelText | dynamicText | async }}
          @if (isRequiredSignal()) {
            <span aria-hidden="true" class="mat-mdc-form-field-required-marker mdc-floating-label--required"></span>
          }
        </span>
      }
    </div>
    <div class="dbx-forge-form-field-outline-trailing"></div>
  </div>
  <div class="dbx-forge-form-field-content">
    <ng-container #fieldComponent></ng-container>
  </div>
</div>
<div class="mat-mdc-form-field-subscript-wrapper mat-mdc-form-field-bottom-align mat-mdc-form-field-subscript-dynamic-size">
  @if (showErrorsSignal()) {
    <div class="mat-mdc-form-field-error-wrapper">
      <div class="mat-mdc-form-field-error mat-mdc-form-field-bottom-align" [id]="errorIdSignal()">{{ firstErrorMessageSignal() }}</div>
    </div>
  } @else if (hintSignal(); as hint) {
    <div class="mat-mdc-form-field-hint-wrapper">
      <div class="mat-mdc-form-field-hint mat-mdc-form-field-bottom-align" [id]="hintIdSignal()">{{ hint }}</div>
    </div>
  }
</div>
