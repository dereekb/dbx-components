<div class="dbx-texteditor-field" [ngClass]="compactClassSignal()" [class.dbx-texteditor-field-disabled]="isDisabled()">
  @if (labelSignal()) {
    <span class="dbx-label">{{ labelSignal() }}</span>
  }
  <div class="dbx-texteditor-field-input">
    <ngx-editor [editor]="editor" outputFormat="html" [placeholder]="placeholderSignal()" [formControl]="editorFormControl" [attr.aria-invalid]="ariaInvalid()" [attr.aria-describedby]="ariaDescribedBy()"></ngx-editor>
  </div>
  <div class="dbx-texteditor-field-menu">
    <ngx-editor-menu [editor]="editor" [disabled]="isDisabled()"></ngx-editor-menu>
  </div>
  @if (errorsToDisplay()[0]; as error) {
    <div class="dbx-form-description dbx-form-error" [id]="errorId()">{{ error.message }}</div>
  } @else if (descriptionSignal()) {
    <div class="dbx-form-description" [id]="hintId()">{{ descriptionSignal() }}</div>
  }
</div>
