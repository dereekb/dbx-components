<div class="dbx-searchable-field dbx-searchable-chip-field">
  <mat-chip-grid #chipGrid>
    @for (dv of displayValuesSignal(); track $index) {
      <mat-chip-row (removed)="removeWithDisplayValue(dv)">
        <dbx-searchable-field-autocomplete-item [displayValue]="dv"></dbx-searchable-field-autocomplete-item>
        <button matChipRemove>
          <mat-icon>cancel</mat-icon>
        </button>
      </mat-chip-row>
    }
    <input #textInput class="dbx-forge-bare-input" [class.dbx-warn]="inputErrorMessage" [formControl]="inputCtrl" [matAutocomplete]="auto" [matChipInputFor]="chipGrid" [matChipInputSeparatorKeyCodes]="separatorKeysCodes" (matChipInputTokenEnd)="addChip($event)" [placeholder]="searchInputPlaceholder()" (blur)="onBlur()" (keydown)="tabPressedOnInput($event)" [attr.aria-invalid]="ariaInvalid()" [attr.aria-describedby]="ariaDescribedBy()" />
  </mat-chip-grid>
  @if (inputCtrl.value && inputCtrl.touched && inputErrorMessage) {
    <div class="dbx-small mat-mdc-form-field-error mat-mdc-form-field-bottom-align">{{ inputErrorMessage }}</div>
  }
</div>
<mat-autocomplete class="dbx-searchable-text-field-autocomplete" #auto="matAutocomplete" (optionSelected)="selectedChip($event)">
  @for (result of searchResultsSignal(); track $index) {
    <mat-option [value]="result">
      <dbx-searchable-field-autocomplete-item [displayValue]="result"></dbx-searchable-field-autocomplete-item>
    </mat-option>
  }
</mat-autocomplete>
