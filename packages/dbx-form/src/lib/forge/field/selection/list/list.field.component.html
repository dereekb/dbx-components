<div class="dbx-list-item-field" [class.dbx-forge-disabled]="isDisabled()" dbxListItemModifier [dbxListItemIsSelectedModifier]="isSelectedModifierFunctionSignal()">
  @if (labelSignal()) {
    <span class="dbx-label dbx-label-padded">{{ labelSignal() }}</span>
  }
  <div class="dbx-list-item-field-content">
    <dbx-injection [config]="configSignal()"></dbx-injection>
  </div>
  <mat-divider></mat-divider>
  @if (hintSignal()) {
    <div class="dbx-form-description">{{ hintSignal() }}</div>
  }
</div>
