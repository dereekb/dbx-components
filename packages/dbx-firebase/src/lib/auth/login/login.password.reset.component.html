<div class="dbx-firebase-password-reset" aria-live="polite">
  @if (resetCompleteSignal()) {
    <div role="status">
      <p class="dbx-hint">Your password has been reset successfully. You can now log in with your new password.</p>
      <ng-content select="[success]"></ng-content>
    </div>
  } @else {
    <ng-container dbxAction [dbxActionHandler]="handleResetAction">
      <dbx-firebase-password-reset-form dbxActionForm [config]="formConfigSignal()"></dbx-firebase-password-reset-form>
      <div class="dbx-flex">
        <dbx-button class="dbx-button-wide" text="Reset Password" [raised]="true" color="primary" dbxActionButton></dbx-button>
      </div>
      <dbx-error dbxActionError>
        <ng-content select="[error]"></ng-content>
      </dbx-error>
      <ng-content></ng-content>
    </ng-container>
  }
</div>
