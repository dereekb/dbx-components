@switch (stateSignal()) {
  @case ('none') {
    <!-- Loading -->
    <ng-container *ngTemplateOutlet="loadingTemplate"></ng-container>
  }
  @case ('loading') {
    <!-- Loading -->
    <div role="status" aria-live="polite" [attr.aria-busy]="true">
      <ng-container *ngTemplateOutlet="loadingTemplate"></ng-container>
    </div>
  }
  @case ('content') {
    <!-- Content -->
    <ng-content></ng-content>
  }
  @case ('error') {
    <!-- Error -->
    <div role="alert" aria-live="assertive">
      <ng-container *ngTemplateOutlet="errorTemplate"></ng-container>
    </div>
  }
}

<ng-template #loadingTemplate>
  @if (hasNoCustomLoadingSignal()) {
    <dbx-loading-progress [mode]="modeSignal()" [value]="loadingProgressSignal()" [color]="color()" [text]="text()" [linear]="linear()" [diameter]="diameter()"></dbx-loading-progress>
  }
  <div #customLoading>
    <ng-content select="[loading]"></ng-content>
  </div>
</ng-template>

<ng-template #errorTemplate>
  @if (hasNoCustomErrorSignal()) {
    <dbx-error [error]="error()"></dbx-error>
  }
  <div #customError>
    <ng-content select="[error]"></ng-content>
  </div>
  <ng-content select="[errorAction]"></ng-content>
</ng-template>
