@switch (modeSignal()) {
  @case ('bar') {
    <!-- Bar -->
    <nav mat-tab-nav-bar [tabPanel]="tabPanel" [attr.mat-align-tabs]="navAlign()" aria-label="Main navigation">
      @for (x of anchorsSignal(); track x.anchor) {
        <dbx-anchor [anchor]="x.anchor">
          <a mat-tab-link [active]="x.selected" [attr.aria-current]="x.selected ? 'page' : null">{{ x.anchor.title }}</a>
        </dbx-anchor>
      }
    </nav>
    <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
  }
  @default {
    <!-- Button -->
    @switch (buttonMode()) {
      <!-- Menu -->
      @case ('menu') {
        <dbx-button class="nav-menu-button" ariaLabel="open navigation" [buttonDisplay]="buttonDisplaySignal()" [iconOnly]="isIconModeSignal()" [fab]="fab()" [matMenuTriggerFor]="menu" [disabled]="hasNoAnchorsSignal()" allowClickPropagation>
          @if (showMenuCaret()) {
            <mat-icon aria-hidden="true">arrow_drop_down</mat-icon>
          }
        </dbx-button>
        <mat-menu #menu>
          @for (x of anchorsSignal(); track x) {
            <dbx-anchor [anchor]="x.anchor">
              <button mat-menu-item [ngClass]="x.selected ? 'active' : ''" [attr.aria-current]="x.selected ? 'page' : null">
                @if (x.anchor.icon) {
                  <mat-icon aria-hidden="true">{{ x.anchor.icon }}</mat-icon>
                }
                {{ x.anchor.title }}
              </button>
            </dbx-anchor>
          }
        </mat-menu>
      }
      <!-- Rotate -->
      @case ('rotate') {
        <dbx-anchor [anchor]="nextRotateAnchorSignal()?.anchor">
          <dbx-button class="nav-menu-button" ariaLabel="open navigation" [buttonDisplay]="buttonDisplaySignal()" [iconOnly]="isIconModeSignal()" [fab]="fab()" [disabled]="hasNoAnchorsSignal()"></dbx-button>
        </dbx-anchor>
      }
    }
  }
}
