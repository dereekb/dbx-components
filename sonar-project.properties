# SonarQube Configuration
sonar.exclusions=setup/**,docker/nginx/**,tools/**,**/*.spec.ts,**/*.generated.ts,**/*.generated.*

# Exclude spec files, generated files, and registry data tables from copy-paste detection.
# - **/*.generated.* — generator output dominates the duplication metric otherwise.
# - packages/dbx-components-mcp/src/registry/** and src/tools/data/** — these
#   files are typed registry tables (UI components, form fields, actions, pipes,
#   filters, UI patterns). Each entry is a structurally similar object literal
#   by design; reducing the surface duplication via abstraction would harm
#   readability of the data. Real logic duplication in the package is addressed
#   by sharing a base in src/tools/_validate, _lookup, _search, etc.
sonar.cpd.exclusions=**/*.spec.ts,**/*.generated.ts,**/*.generated.*,packages/dbx-components-mcp/src/registry/**,packages/dbx-components-mcp/src/tools/data/**

sonar.issue.ignore.multicriteria=s6564,s6706,s6418,s2004,s3776,s5332,s3776js,s5843js,s1135js

# typescript:S6564 - "Redundant type aliases should not be used"
# This project uses semantic type aliases extensively (e.g., ModelKey = string)
# as a core architectural pattern for readability and domain modeling.
sonar.issue.ignore.multicriteria.s6564.ruleKey=typescript:S6564
sonar.issue.ignore.multicriteria.s6564.resourceKey=**/*.ts

# secrets:S6706 - "Hard-coded credentials are security-sensitive"
# These are self-signed certs used only for local development (docker/nginx).
sonar.issue.ignore.multicriteria.s6706.ruleKey=secrets:S6706
sonar.issue.ignore.multicriteria.s6706.resourceKey=docker/nginx/certs/**

# typescript:S6418 - "Hard-coded secrets are security-sensitive"
# Environment base.ts contains public client-side tokens (Firebase, Mapbox, Segment)
# that are safe to expose in frontend code.
sonar.issue.ignore.multicriteria.s6418.ruleKey=typescript:S6418
sonar.issue.ignore.multicriteria.s6418.resourceKey=apps/demo/src/environments/**

# typescript:S2004 - "Don't nest functions more than 4 levels deep"
# Test spec files use deeply nested describe/it/beforeEach blocks by design.
sonar.issue.ignore.multicriteria.s2004.ruleKey=typescript:S2004
sonar.issue.ignore.multicriteria.s2004.resourceKey=**/*.spec.ts

# typescript:S3776 - "Cognitive Complexity of functions should not be too high"
# The MCP package contains registry lookup, validation, and CLI tool functions
# that are inherently branchy (large switch/map dispatchers, multi-field validators).
# This complexity is structural, not accidental.
sonar.issue.ignore.multicriteria.s3776.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.s3776.resourceKey=packages/dbx-components-mcp/**/*.ts

# typescript:S5332 - "Using clear-text protocols is security-sensitive"
# Spec files use http:// for emulator endpoints, fixture URLs, and test doubles.
# These never reach production and pose no security risk.
sonar.issue.ignore.multicriteria.s5332.ruleKey=typescript:S5332
sonar.issue.ignore.multicriteria.s5332.resourceKey=**/*.spec.ts

# javascript:S3776 - "Cognitive Complexity of functions should not be too high"
# MCP build scripts (extract-firebase-models, generate-css-tokens, extract-rule-catalog)
# are TypeScript AST scanners with the same structural complexity as the TS sources.
sonar.issue.ignore.multicriteria.s3776js.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.s3776js.resourceKey=packages/dbx-components-mcp/scripts/**/*.mjs

# javascript:S5843 - "Regular expressions should not be too complicated"
# The enum-body parser regex in extract-firebase-models.mjs is a build-time AST helper.
sonar.issue.ignore.multicriteria.s5843js.ruleKey=javascript:S5843
sonar.issue.ignore.multicriteria.s5843js.resourceKey=packages/dbx-components-mcp/scripts/**/*.mjs

# javascript:S1135 - "Track uses of TODO tags"
# extract-firebase-models.mjs contains an inline TODO referencing the S5843 ignore
# above (the regex is intentionally complex for AST parsing).
sonar.issue.ignore.multicriteria.s1135js.ruleKey=javascript:S1135
sonar.issue.ignore.multicriteria.s1135js.resourceKey=packages/dbx-components-mcp/scripts/**/*.mjs
