# SonarQube Configuration
sonar.issue.ignore.multicriteria=s6564,s6706,s6418

# typescript:S6564 - "Redundant type aliases should not be used"
# This project uses semantic type aliases extensively (e.g., ModelKey = string)
# as a core architectural pattern for readability and domain modeling.
sonar.issue.ignore.multicriteria.s6564.ruleKey=typescript:S6564
sonar.issue.ignore.multicriteria.s6564.resourceKey=**/*.ts

# secrets:S6706 - "Hard-coded credentials are security-sensitive"
# These are self-signed certs used only for local development (docker/nginx).
sonar.issue.ignore.multicriteria.s6706.ruleKey=secrets:S6706
sonar.issue.ignore.multicriteria.s6706.resourceKey=docker/nginx/certs/**

# typescript:S6418 - "Hard-coded secrets are security-sensitive"
# Environment base.ts contains public client-side tokens (Firebase, Mapbox, Segment)
# that are safe to expose in frontend code.
sonar.issue.ignore.multicriteria.s6418.ruleKey=typescript:S6418
sonar.issue.ignore.multicriteria.s6418.resourceKey=apps/demo/src/environments/**
